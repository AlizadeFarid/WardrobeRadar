<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wardrobe Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="side_panel.css">
</head>
<body>
  <div class="app-container">
    
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Wardrobe Radar</span>
      </div>
    </header>

    <main class="content">
      <!-- State 1: Empty / Waiting -->
      <div id="state-empty" class="state-container active">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h18v18H3zM3 9h18M9 21V9"/>
          </svg>
        </div>
        <h2>Ready to scan!</h2>
        <p>Press <strong>Cmd+Shift+S</strong> (Mac) or <strong>Ctrl+Shift+S</strong> (Windows) to select and find the clothing you like from any image or video.</p>
        <button id="start-btn">Start Scanning</button>
      </div>

      <!-- State: Error -->
      <div id="state-error" class="state-container">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <h2>An Error Occurred</h2>
        <p id="error-message"></p>
        <button id="retry-btn" style="margin-top: 15px; padding: 10px 20px; background: transparent; border: 1px solid #EF4444; color: #EF4444; border-radius: 8px; cursor: pointer;">Try Again</button>
      </div>

      <!-- State 2: Loading / Analyzing -->
      <div id="state-loading" class="state-container">
        <div class="cropped-image-wrapper">
          <img id="preview-image" src="" alt="Selected item">
          <div class="scan-line"></div>
        </div>
        <div class="loading-text">
          <span class="spinner"></span>
          Finding matching clothes...
        </div>
        
        <div class="skeleton-list">
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 80%"></div>
              <div class="skeleton-line" style="width: 40%"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 70%"></div>
              <div class="skeleton-line" style="width: 50%"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 90%"></div>
              <div class="skeleton-line" style="width: 30%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- State 3: Results -->
      <div id="state-results" class="state-container">
        <div class="results-header">
          <h3>Matches Found</h3>
          <span class="badge" id="results-count">0</span>
        </div>
        <button id="new-search-btn" style="margin-bottom: 16px; padding: 12px 24px; background: white; border: 1px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; width: 100%; transition: all 0.2s ease;">New Scan</button>
        <div class="results-list" id="results-container">
          <!-- Cards will be injected here via JS -->
        </div>
      </div>

    </main>
  </div>
  <script src="side_panel.js"></script>
</body>
</html>
