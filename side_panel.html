<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wardrobe Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="side_panel.css">
</head>
<body>
  <div class="app-container">
    
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Wardrobe Radar</span>
      </div>
    </header>

    <main class="content">
      <!-- State 1: Empty / Waiting -->
      <div id="state-empty" class="state-container active">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h18v18H3zM3 9h18M9 21V9"/>
          </svg>
        </div>
        <h2>Axtarış üçün hazır!</h2>
        <p>Videonun və ya şəklin üzərində bəyəndiyiniz geyimi seçmək üçün <strong>Cmd+Shift+S</strong> (Mac) və ya <strong>Ctrl+Shift+S</strong> (Windows) qısayolunu istifadə edin.</p>
        <button id="start-btn" style="margin-top: 20px; padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">Axtarışa Başla</button>
      </div>

      <!-- State 2: Loading / Analyzing -->
      <div id="state-loading" class="state-container">
        <div class="cropped-image-wrapper">
          <img id="preview-image" src="" alt="Selected item">
          <div class="scan-line"></div>
        </div>
        <div class="loading-text">
          <span class="spinner"></span>
          Uyğun geyimlər axtarılır...
        </div>
        
        <div class="skeleton-list">
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 80%"></div>
              <div class="skeleton-line" style="width: 40%"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 70%"></div>
              <div class="skeleton-line" style="width: 50%"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-info">
              <div class="skeleton-line" style="width: 90%"></div>
              <div class="skeleton-line" style="width: 30%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- State 3: Results -->
      <div id="state-results" class="state-container">
        <div class="results-header">
          <h3>Tapılan Nəticələr</h3>
          <span class="badge" id="results-count">0</span>
        </div>
        <div class="results-list" id="results-container">
          <!-- Cards will be injected here via JS -->
        </div>
      </div>

    </main>
  </div>
  <script src="side_panel.js"></script>
</body>
</html>
